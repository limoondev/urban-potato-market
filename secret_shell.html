<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body {
            font-family: monospace;
            background-color: #ffffff;
            color: #000000;
            margin: 20px;
        }

        /* The hidden terminal styles */
        #secret-terminal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0d0d0d;
            color: #00ff00;
            padding: 20px;
            box-sizing: border-box;
            z-index: 9999;
        }

        #terminal-output {
            white-space: pre-wrap;
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #00ff00;
        }

        #terminal-input-line {
            display: flex;
            font-size: 1.2rem;
        }

        #prompt {
            margin-right: 10px;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }

        #cmd {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: monospace;
            font-size: 1.2rem;
            outline: none;
            width: 100%;
            text-shadow: 0 0 5px #00ff00;
        }
    </style>
</head>
<body>
    <div id="fake-error">Cannot GET /</div>

    <div id="secret-terminal">
        <div id="terminal-output">
Arcane Root Shell v1.0
Access Granted.
Type 'generate <days>' to create a new license key.
Example: generate 30
        </div>
        <div id="terminal-input-line">
            <span id="prompt">root@arcane:~#</span>
            <input type="text" id="cmd" autocomplete="off" spellcheck="false" autofocus>
        </div>
    </div>

    <script>
        // Konami Code: Up, Up, Down, Down, Left, Right, Left, Right, B, A
        const konamiCode = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
        let konamiIndex = 0;

        document.addEventListener('keydown', (e) => {
            // Check if the secret terminal is already active
            if (document.getElementById('secret-terminal').style.display === 'block') {
                return;
            }

            if (e.key.toLowerCase() === konamiCode[konamiIndex].toLowerCase()) {
                konamiIndex++;
                if (konamiIndex === konamiCode.length) {
                    activateTerminal();
                    konamiIndex = 0; // reset
                }
            } else {
                konamiIndex = 0; // reset if wrong key
            }
        });

        function activateTerminal() {
            document.getElementById('fake-error').style.display = 'none';
            document.getElementById('secret-terminal').style.display = 'block';
            document.body.style.backgroundColor = '#0d0d0d';
            document.body.style.margin = '0';
            document.getElementById('cmd').focus();
        }

        const terminalOutput = document.getElementById('terminal-output');
        const cmdInput = document.getElementById('cmd');

        // Keep focus on input if clicking anywhere
        document.getElementById('secret-terminal').addEventListener('click', () => {
            cmdInput.focus();
        });

        cmdInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const command = cmdInput.value.trim();
                if (command === "") return;
                
                terminalOutput.textContent += '\nroot@arcane:~# ' + command + '\n';
                cmdInput.value = '';

                const args = command.split(' ');

                if (args[0] === 'clear') {
                    terminalOutput.textContent = 'Arcane Root Shell v1.0\nAccess Granted.\nType \'generate <days> <discord_id>\' to create a new license key.\n';
                } 
                else if (args[0] === 'generate') {
                    const days = parseInt(args[1]) || 30;
                    const discordId = args[2] || ""; // Optional Discord ID

                    if (!discordId) {
                        terminalOutput.textContent += `> WARNING: No Discord ID provided. Generating anonymous key.\n`;
                    }

                    try {
                        const response = await fetch('/api/admin/generate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ admin_secret: 'arcane_secret_admin_123', days: days, discord_id: discordId })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            terminalOutput.textContent += `> SUCCESS: Key Generated\n> KEY: ${data.key}\n> EXPIRES IN: ${data.duration_days} days\n`;
                            if (data.discord_username) {
                                terminalOutput.textContent += `> ASSIGNED TO: ${data.discord_username}\n`;
                            }
                        } else {
                            terminalOutput.textContent += `> ERROR: ${data.message}\n`;
                        }
                    } catch (err) {
                        terminalOutput.textContent += `> ERROR: Network failure\n`;
                    }
                }
                else {
                    terminalOutput.textContent += `> Unknown command: ${args[0]}. Try 'generate <days>'.\n`;
                }

                // Scroll to bottom
                document.getElementById('secret-terminal').scrollTop = document.getElementById('secret-terminal').scrollHeight;
            }
        });
    </script>
</body>
</html>
